<div class="container">
<div class="  mt-4 mb-4">
    <div class="row">
        <div class="col-3">Card Number</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.cardDetails.cardNumber">
        </div>
    </div>
    <div class="row">
        <div class="col-3">Name on Card</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.cardDetails.nameOnCard">
        </div>
    </div>
    <div class="row">
        <div class="col-3">Card Type</div>
        <div class="col-6">
             <select class="form-select" aria-label="Default select example" [formField]="paymentobj.cardDetails.cardType">
                <option selected>--Select--</option>
                <option value="Debit Card">Debit Card</option>
                <option value="Credit Card">Credit Card</option>
                
            </select> 
        </div>
    </div>
    <div class="row">
        <div class="col-3">Expiry Date</div>
        <div class="col-6">
            <input type="text" class="form-control" [formField]="paymentobj.cardDetails.expiryDate">
        </div>
    </div>
    <div class="row">
        <div class="col-3">CVV</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.cardDetails.cvv">
        </div>
    </div>
    <div class="row">
        <div class="col-3">Amount</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.amount">
        </div>
    </div>

</div>
   <button class="btn btn-primary" id="SubmitPayment" (click)="sendpaymentdetails()" >Proceed</button>
</div>

<div class="container">
    <h1>Payment History</h1>
    <button class="btn btn-primary" id="GetPaymentHistory" (click)="getpaymenthistory()" >Get Results</button>
    <div class="mt-3">
        <strong>Entered Card Number:</strong>
        {{ paymentModel().cardDetails.cardNumber }}
        <ul>
            <li *ngFor="let item of respobj()" >
                {{ item.cardDetails.cardNumber }}
                {{ item.amount}}
            </li>
        </ul>
<pre>{{ respobj() | json }}</pre>
    </div>
</div>
