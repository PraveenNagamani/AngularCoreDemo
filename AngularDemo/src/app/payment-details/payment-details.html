<div class="container">
<div class="  mt-4 mb-4">
    <div class="row">
        <div class="col-3">Card Number</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.cardNumber">
        </div>
    </div>
    <div class="row">
        <div class="col-3">Expiry Date</div>
        <div class="col-6">
            <input type="text" class="form-control" [formField]="paymentobj.expiryDate">
        </div>
    </div>
    <div class="row">
        <div class="col-3">CVV</div>
        <div class="col-6">
            <input type="text" class="form-control"  [formField]="paymentobj.cvv">
        </div>
    </div>

</div>
   <button class="btn btn-primary" id="SubmitPayment" >Proceed</button>
</div>

<div class="container">
    <h1>Payment History</h1>
    <button class="btn btn-primary" id="GetPaymentHistory" (click)="getpaymenthistory()" >Get Results</button>
    <div class="mt-3">
        <strong>Entered Card Number:</strong>
        {{ paymentModel().cardNumber }}
    </div>
</div>
